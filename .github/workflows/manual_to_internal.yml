name: Manual Deploy to Internal Track

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (leave blank to auto-use the latest release-please tag)'
        required: false 
        default: ''     

jobs:
  manual-build-and-deploy:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Name
        id: resolve_version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            echo "Using manually entered version: ${{ github.event.inputs.version_name }}"
            echo "RESOLVED_VERSION=${{ github.event.inputs.version_name }}" >> $GITHUB_ENV
          else
            # Grabs the most recent git tag across the entire repository
            LATEST_TAG=$(git describe --tags --abbrev=0)
            echo "No input provided. Auto-resolved latest tag: $LATEST_TAG"
            echo "RESOLVED_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > composeApp/release.jks

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > composeApp/google-services.json

      - name: Build Release Bundle (AAB)
        run: ./gradlew :composeApp:clean :composeApp:bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          OCM_API_KEY: ${{ secrets.OCM_API_KEY }}
          # Now we use the environment variable we created in the bash script
          VERSION_NAME: ${{ env.RESOLVED_VERSION }} 

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: fyi.tono.stroppark
          releaseFiles: composeApp/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
