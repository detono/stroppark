name: Android CI/CD

on:
  push:
    branches: [ main ]

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # 'simple' is often safest for complex Kotlin Gradle setups. 
          # It generates the changelog and tags the repo beautifully.
          release-type: simple

  build-and-deploy:
    needs: release-please
    # This ensures we only run the heavy Android build and Play Store upload 
    # when an actual release is minted, saving your GitHub Actions minutes!
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Unit Tests
        run: ./gradlew :composeApp:testDebugUnitTest

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > composeApp/release.jks

      - name: Build Release Bundle (AAB)
        # We will inject the versions dynamically via environment variables or Gradle properties
        run: ./gradlew :composeApp:bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.your.package.name 
          releaseFiles: composeApp/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
