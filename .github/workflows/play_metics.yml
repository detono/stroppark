name: Play Store Metrics

on:
  # Run automatically after your internal track deploy finishes
  workflow_run:
    workflows: ["Android CI/CD"]
    types: [completed]
  # Or trigger manually from the Actions tab
  workflow_dispatch:

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (skip if deploy failed)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kotlin
        uses: fwilhe2/setup-kotlin@v1

      - name: Get Google OAuth Token
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_JSON }}

      - name: Get Access Token
        id: token
        run: echo "GOOGLE_OAUTH_TOKEN=$(gcloud auth print-access-token)" >> $GITHUB_ENV

      - name: Fetch Play Console Stats
        run: kotlin scripts/fetch_metrics.main.kts
        env:
          PLAY_API_TOKEN: ${{ env.GOOGLE_OAUTH_TOKEN }}
          PACKAGE_NAME: fyi.tono.stroppark

      - name: Send Slack Notification
        if: always()   # send even if crash rate was "unknown"
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"📊 Internal build crash-free rate: *${{ env.CRASH_FREE_RATE }}%*\nReady to promote to production?\"
                }
              }
            ]
          }" ${{ secrets.SLACK_WEBHOOK_URL }}
